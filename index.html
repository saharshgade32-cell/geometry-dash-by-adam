<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEOMETRY DASH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0010;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    z-index: 10;
  }

  #score-display {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
    text-shadow: 0 0 12px #ff6fff, 0 0 30px #ff00ff44;
  }

  #attempts-display {
    font-size: 11px;
    font-weight: 400;
    color: #aa88ff;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
  }

  #gameWrapper {
    position: relative;
    width: 900px;
    max-width: 100vw;
  }

  canvas {
    display: block;
    border: 1px solid #3300ff44;
    box-shadow: 0 0 40px #6600ff33, 0 0 80px #3300ff22, inset 0 0 40px #00000088;
    border-radius: 4px;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5, 0, 20, 0.88);
    border-radius: 4px;
    backdrop-filter: blur(6px);
    gap: 18px;
    transition: opacity 0.3s;
  }

  #overlay.hidden { display: none; }

  #overlay h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    letter-spacing: 8px;
    color: #fff;
    text-shadow: 0 0 20px #ff00ff, 0 0 50px #ff00ff88;
    animation: pulse 2s ease-in-out infinite;
  }

  #overlay .sub {
    font-size: 11px;
    color: #aa88ff;
    letter-spacing: 4px;
    font-family: 'Share Tech Mono', monospace;
  }

  #playBtn {
    margin-top: 10px;
    padding: 14px 48px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #fff;
    background: linear-gradient(135deg, #7700ff, #ff00aa);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 20px #7700ff88, 0 0 40px #ff00aa44;
    transition: transform 0.1s, box-shadow 0.2s;
  }

  #playBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #aa00ff, 0 0 60px #ff00aa66;
  }

  #playBtn:active { transform: scale(0.97); }

  #deathMsg {
    font-size: 11px;
    color: #ff4488;
    letter-spacing: 3px;
    font-family: 'Share Tech Mono', monospace;
    min-height: 18px;
  }

  #progressBar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #7700ff, #ff00aa, #00ffcc);
    width: 0%;
    transition: none;
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 8px #ff00aa;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px #ff00ff, 0 0 50px #ff00ff88; }
    50% { text-shadow: 0 0 35px #ff00ff, 0 0 80px #ff00ffcc, 0 0 120px #ff00ff44; }
  }
</style>
</head>
<body>

<div id="ui">
  <div id="score-display">SCORE: <span id="scoreVal">0</span></div>
  <div id="attempts-display">ATTEMPTS: <span id="attemptsVal">0</span></div>
</div>

<div id="gameWrapper">
  <canvas id="canvas" width="900" height="300"></canvas>
  <div id="overlay">
    <h1>GEOMETRY DASH</h1>
    <div class="sub">CLICK OR SPACE TO JUMP</div>
    <div id="deathMsg"></div>
    <button id="playBtn">▶ PLAY</button>
  </div>
  <div id="progressBar"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const playBtn = document.getElementById('playBtn');
const scoreValEl = document.getElementById('scoreVal');
const attemptsValEl = document.getElementById('attemptsVal');
const deathMsgEl = document.getElementById('deathMsg');
const progressBar = document.getElementById('progressBar');

const W = canvas.width, H = canvas.height;
const GROUND_Y = H - 60;
const GRAVITY = 0.7;
const JUMP_FORCE = -13.5;
const SPEED_INIT = 5;
const PLAYER_SIZE = 30;

// Color palette
const COLORS = {
  bg1: '#0a0010',
  bg2: '#12002a',
  ground: '#1a0040',
  groundLine: '#3300aa',
  player: '#00ffcc',
  playerGlow: '#00ffcc88',
  spike: '#ff3366',
  spikeGlow: '#ff336644',
  block: '#5500ff',
  blockGlow: '#5500ff44',
  blockTop: '#7722ff',
  star: '#ffffff',
  trail: '#ff00aa',
};

let state = 'idle'; // idle | playing | dead
let score = 0;
let attempts = 0;
let frameCount = 0;
let speed = SPEED_INIT;
let bgOffset = 0;

// Player
let player = {};
// Obstacles
let obstacles = [];
// Stars
let stars = [];
// Particles
let particles = [];
// Trail
let trail = [];

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (GROUND_Y - 20),
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.6 + 0.2,
      alpha: Math.random() * 0.7 + 0.3,
    });
  }
}

function resetPlayer() {
  player = {
    x: 120,
    y: GROUND_Y - PLAYER_SIZE,
    vy: 0,
    onGround: false,
    rotation: 0,
    dead: false,
  };
  trail = [];
  particles = [];
}

function resetObstacles() {
  obstacles = [];
  nextObstacleX = W + 100;
  gapCounter = 0;
}

let nextObstacleX = W + 100;
let gapCounter = 0;

function spawnObstacle() {
  const SW = 22, SH = 28;
  // Start from the last obstacle's right edge, or just off-screen
  let baseX = W + 100;
  if (obstacles.length > 0) {
    const last = obstacles[obstacles.length - 1];
    baseX = last.x + (last.w || SW) + 130 + Math.random() * 100;
  }
  const x = baseX;
  const r = Math.random();

  if (r < 0.18) {
    obstacles.push({ type: 'spike', x, y: GROUND_Y, w: SW, h: SH });
  } else if (r < 0.36) {
    obstacles.push({ type: 'spike', x, y: GROUND_Y, w: SW, h: SH });
    obstacles.push({ type: 'spike', x: x + SW + 2, y: GROUND_Y, w: SW, h: SH });
  } else if (r < 0.52) {
    for (let i = 0; i < 3; i++)
      obstacles.push({ type: 'spike', x: x + i * (SW + 2), y: GROUND_Y, w: SW, h: SH });
  } else if (r < 0.64) {
    for (let i = 0; i < 4; i++)
      obstacles.push({ type: 'spike', x: x + i * (SW + 2), y: GROUND_Y, w: SW, h: SH });
  } else if (r < 0.72) {
    // Spike gap spike
    obstacles.push({ type: 'spike', x, y: GROUND_Y, w: SW, h: SH });
    obstacles.push({ type: 'spike', x: x + SW + 30, y: GROUND_Y, w: SW, h: SH });
  } else if (r < 0.80) {
    // 2-gap-1
    obstacles.push({ type: 'spike', x, y: GROUND_Y, w: SW, h: SH });
    obstacles.push({ type: 'spike', x: x + SW + 2, y: GROUND_Y, w: SW, h: SH });
    obstacles.push({ type: 'spike', x: x + SW * 2 + 34, y: GROUND_Y, w: SW, h: SH });
  } else if (r < 0.87) {
    // Block with spike on top
    const bh = 30;
    obstacles.push({ type: 'block', x, y: GROUND_Y - bh, w: 32, h: bh });
    obstacles.push({ type: 'spike', x: x + 5, y: GROUND_Y - bh, w: SW, h: SH });
  } else if (r < 0.94) {
    // Plain block
    const bh = 30 + Math.floor(Math.random() * 2) * 30;
    obstacles.push({ type: 'block', x, y: GROUND_Y - bh, w: 32, h: bh });
  } else {
    // Five spikes
    for (let i = 0; i < 5; i++)
      obstacles.push({ type: 'spike', x: x + i * (SW + 2), y: GROUND_Y, w: SW, h: SH });
  }
}

function spawnParticles(x, y, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      r: Math.random() * 4 + 2,
      color,
    });
  }
}

function jump() {
  if (state !== 'playing') return;
  if (player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    spawnParticles(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE, '#00ffcc', 6);
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  frameCount = 0;
  speed = SPEED_INIT;
  attempts++;
  attemptsValEl.textContent = attempts;
  scoreValEl.textContent = 0;
  deathMsgEl.textContent = '';
  overlay.classList.add('hidden');
  progressBar.style.width = '0%';
  resetPlayer();
  resetObstacles();
  initStars();
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  state = 'dead';
  spawnParticles(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE / 2, COLORS.player, 20);
  spawnParticles(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE / 2, '#ff00aa', 15);
  setTimeout(() => {
    overlay.classList.remove('hidden');
    const msgs = ['SO CLOSE!', 'NOT QUITE.', 'TRY AGAIN.', 'YOU GOT THIS.', 'ALMOST!'];
    deathMsgEl.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    playBtn.textContent = '▶ RETRY';
  }, 600);
}

// Collision
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function checkCollision() {
  const px = player.x + 3, py = player.y + 3;
  const pw = PLAYER_SIZE - 6, ph = PLAYER_SIZE - 3;
  for (const obs of obstacles) {
    if (obs.type === 'spike') {
      // Triangle hitbox (simplified as smaller rect)
      if (rectsOverlap(px + 4, py + 8, pw - 8, ph - 8, obs.x + 2, obs.y - obs.h + 6, obs.w - 4, obs.h - 6)) {
        return true;
      }
    } else if (obs.type === 'block') {
      if (rectsOverlap(px, py, pw, ph, obs.x, obs.y, obs.w, obs.h)) {
        return true;
      }
    }
  }
  return false;
}

// Drawing helpers
function drawGround() {
  // Ground fill
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Grid lines on ground
  ctx.strokeStyle = COLORS.groundLine;
  ctx.lineWidth = 0.5;
  ctx.globalAlpha = 0.4;
  const gridSize = 32;
  const offset = bgOffset % gridSize;
  for (let x = -offset; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = GROUND_Y; y < H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Ground top line glow
  const grad = ctx.createLinearGradient(0, GROUND_Y - 2, 0, GROUND_Y + 3);
  grad.addColorStop(0, '#7700ffcc');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, GROUND_Y - 2, W, 5);
}

function drawBackground() {
  // Gradient BG
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#050010');
  grad.addColorStop(1, '#110030');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Scrolling bg lines
  ctx.strokeStyle = '#3300ff';
  ctx.lineWidth = 0.4;
  ctx.globalAlpha = 0.15;
  const spacing = 60;
  const off = bgOffset % spacing;
  for (let x = -off; x < W; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GROUND_Y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  if (player.dead) return;
  const cx = player.x + PLAYER_SIZE / 2;
  const cy = player.y + PLAYER_SIZE / 2;

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const alpha = (i / trail.length) * 0.4;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = COLORS.trail;
    const s = PLAYER_SIZE * (i / trail.length) * 0.7;
    ctx.fillRect(t.x - s / 2, t.y - s / 2, s, s);
  }
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(player.rotation);

  // Glow
  ctx.shadowColor = COLORS.player;
  ctx.shadowBlur = 18;

  // Body
  const hs = PLAYER_SIZE / 2;
  const grad = ctx.createLinearGradient(-hs, -hs, hs, hs);
  grad.addColorStop(0, '#00ffdd');
  grad.addColorStop(1, '#0088ff');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(-hs, -hs, PLAYER_SIZE, PLAYER_SIZE, 4);
  ctx.fill();

  // Inner detail
  ctx.strokeStyle = '#ffffff55';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-hs + 5, -hs + 5, PLAYER_SIZE - 10, PLAYER_SIZE - 10, 2);
  ctx.stroke();

  // Center star/dot
  ctx.fillStyle = '#ffffff88';
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawSpike(obs) {
  const x = obs.x, y = obs.y, w = obs.w, h = obs.h;
  ctx.save();
  ctx.shadowColor = COLORS.spike;
  ctx.shadowBlur = 12;
  const grad = ctx.createLinearGradient(x, y - h, x + w, y);
  grad.addColorStop(0, '#ff5588');
  grad.addColorStop(1, '#cc0033');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + w / 2, y - h);
  ctx.lineTo(x + w, y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#ff336688';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBlock(obs) {
  const x = obs.x, y = obs.y, w = obs.w, h = obs.h;
  ctx.save();
  ctx.shadowColor = '#5500ff';
  ctx.shadowBlur = 14;

  // Body
  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, '#6611ff');
  grad.addColorStop(1, '#3300aa');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // Top highlight
  ctx.fillStyle = '#8833ff';
  ctx.fillRect(x, y, w, 5);

  // Grid lines
  ctx.strokeStyle = '#7722ff44';
  ctx.lineWidth = 0.5;
  const gs = 16;
  for (let bx = x; bx < x + w; bx += gs) {
    ctx.beginPath(); ctx.moveTo(bx, y); ctx.lineTo(bx, y + h); ctx.stroke();
  }
  for (let by = y; by < y + h; by += gs) {
    ctx.beginPath(); ctx.moveTo(x, by); ctx.lineTo(x + w, by); ctx.stroke();
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawHUD() {
  // Progress bar glow
  const pct = Math.min(frameCount / 1800, 1);
  progressBar.style.width = (pct * 100) + '%';
}

// LEVEL_LENGTH in frames
const LEVEL_LENGTH = 1800;

function update() {
  if (state !== 'playing') return;

  frameCount++;
  bgOffset += speed;
  speed = SPEED_INIT + frameCount * 0.001; // Gradual speedup

  // Score
  score = Math.floor(frameCount / 6);
  scoreValEl.textContent = score;

  // Stars parallax
  for (const s of stars) {
    s.x -= s.speed;
    if (s.x < 0) { s.x = W; s.y = Math.random() * (GROUND_Y - 20); }
  }

  // Player physics
  player.vy += GRAVITY;
  player.y += player.vy;

  if (player.y >= GROUND_Y - PLAYER_SIZE) {
    player.y = GROUND_Y - PLAYER_SIZE;
    player.vy = 0;
    player.onGround = true;
    player.rotation = Math.round(player.rotation / (Math.PI / 2)) * (Math.PI / 2);
  } else {
    player.onGround = false;
    player.rotation += 0.12;
  }

  // Trail
  trail.push({ x: player.x + PLAYER_SIZE / 2, y: player.y + PLAYER_SIZE / 2 });
  if (trail.length > 12) trail.shift();

  // Move obstacles
  for (const obs of obstacles) obs.x -= speed;
  // Remove off-screen
  while (obstacles.length && obstacles[0].x + 60 < 0) obstacles.shift();

  // Keep spawning until there is an obstacle beyond the right edge
  while (obstacles.length === 0 || obstacles[obstacles.length - 1].x < W + 60) {
    spawnObstacle();
  }

  // Collision
  if (checkCollision()) killPlayer();

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  // Win
  if (frameCount >= LEVEL_LENGTH) {
    // Loop / keep going
    frameCount = 900; speed = SPEED_INIT + 1;
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawStars();
  drawGround();

  for (const obs of obstacles) {
    if (obs.type === 'spike') drawSpike(obs);
    else drawBlock(obs);
  }

  drawPlayer();
  drawParticles();
  drawHUD();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Controls
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (state === 'idle' || state === 'dead') startGame();
    else jump();
  }
});
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (state === 'idle' || state === 'dead') startGame();
  else jump();
});
playBtn.addEventListener('click', e => {
  e.stopPropagation();
  startGame();
});

initStars();
resetPlayer();
loop();
</script>
</body>
</html>
